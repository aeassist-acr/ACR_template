name: Auto Merge PR

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  statuses: write
  checks: read
  actions: read

jobs:
  check-and-merge:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
          
      - name: Check GPG verification
        id: gpg-check
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            console.log('Checking GPG signatures for commits in PR...');
            
            try {
              const { data: prCommits } = await github.rest.pulls.listCommits({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number
              });
              
              let allSigned = true;
              let unsignedCommits = [];
              
              for (const commit of prCommits) {
                const { data: commitDetails } = await github.rest.repos.getCommit({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: commit.sha
                });
                
                // Check if commit is verified
                if (!commitDetails.commit.verification || !commitDetails.commit.verification.verified) {
                  console.log(`❌ Commit ${commit.sha.substring(0, 7)} is not GPG signed or not verified`);
                  allSigned = false;
                  unsignedCommits.push(commit.sha.substring(0, 7));
                } else {
                  console.log(`✅ Commit ${commit.sha.substring(0, 7)} is signed and verified`);
                }
              }
              
              if (!allSigned) {
                core.setOutput('gpg_verified', 'false');
                console.log(`PR contains unsigned/unverified commits: ${unsignedCommits.join(', ')}`);
              } else {
                core.setOutput('gpg_verified', 'true');
                console.log('✅ All commits are GPG signed and verified');
              }
            } catch (error) {
              console.error('Error checking GPG verification:', error);
              core.setOutput('gpg_verified', 'false');
            }
          
      - name: Close PR if GPG verification failed
        if: steps.gpg-check.outputs.gpg_verified == 'false'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              state: 'closed'
            });
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '🚫 This PR has been automatically closed because it contains commits that are not GPG signed/verified.'
            });
          
      - name: Get changed files
        id: changed-files
        if: steps.gpg-check.outputs.gpg_verified == 'true'
        uses: tj-actions/changed-files@v44
        
      - name: Check for workflow file changes
        id: check-workflows
        if: steps.gpg-check.outputs.gpg_verified == 'true'
        run: |
          echo "Changed files: ${{ steps.changed-files.outputs.all_changed_files }}"
          
          WORKFLOW_MODIFIED=false
          for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
            if [[ "$file" == .github/workflows/* ]]; then
              echo "⚠️ Workflow file modified: $file"
              WORKFLOW_MODIFIED=true
              break
            fi
          done
          
          echo "workflow_modified=$WORKFLOW_MODIFIED" >> $GITHUB_OUTPUT
          
      - name: Close PR if workflow files modified
        if: steps.check-workflows.outputs.workflow_modified == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              state: 'closed'
            });
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '🚫 This PR has been automatically closed because it modifies workflow files.'
            });
            
      - name: Check for csproj file changes
        id: check-csproj
        if: steps.gpg-check.outputs.gpg_verified == 'true'
        run: |
          CSPROJ_MODIFIED=false
          for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
            if [[ "$file" == *.csproj ]]; then
              echo "⚠️ Csproj file modified: $file"
              CSPROJ_MODIFIED=true
              break
            fi
          done
          
          echo "csproj_modified=$CSPROJ_MODIFIED" >> $GITHUB_OUTPUT
          
      - name: Check for HTTP and CLIENT related code
        id: check-code
        if: steps.gpg-check.outputs.gpg_verified == 'true'
        run: |
          echo "Checking for HTTP and CLIENT related code changes..."
          
          CONTAINS_RESTRICTED=false
          
          # Get the diff content
          git diff origin/${{ github.base_ref }}...HEAD > /tmp/diff.txt
          
          # Check for HTTP-related patterns (case-insensitive)
          if grep -iE '(HttpClient|HttpRequest|HttpResponse|WebClient|WebRequest|HttpWebRequest|HttpWebResponse|RestClient|Http\.)|using\s+System\.Net\.Http' /tmp/diff.txt; then
            echo "⚠️ Found HTTP-related code"
            CONTAINS_RESTRICTED=true
          fi

          echo "contains_restricted=$CONTAINS_RESTRICTED" >> $GITHUB_OUTPUT
          
      - name: Comment on PR with check results
        if: steps.gpg-check.outputs.gpg_verified == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const workflowModified = '${{ steps.check-workflows.outputs.workflow_modified }}' === 'true';
            const csprojModified = '${{ steps.check-csproj.outputs.csproj_modified }}' === 'true';
            const containsRestricted = '${{ steps.check-code.outputs.contains_restricted }}' === 'true';
            
            let comment = '## 🤖 Automated PR Check Results\n\n';
            comment += '| Check | Result |\n';
            comment += '|-------|--------|\n';
            comment += `| GPG Verification | ✅ Passed |\n`;
            comment += `| Workflow Files | ${workflowModified ? '❌ Modified (PR Closed)' : '✅ Not Modified'} |\n`;
            comment += `| .csproj Files | ${csprojModified ? '❌ Modified' : '✅ Not Modified'} |\n`;
            comment += `| HTTP/CLIENT Code | ${containsRestricted ? '❌ Found' : '✅ Not Found'} |\n`;
            
            if (!workflowModified && !csprojModified && !containsRestricted) {
              comment += '\n✅ **All checks passed! PR will be automatically merged.**';
            } else if (!workflowModified) {
              comment += '\n❌ **PR cannot be automatically merged due to failed checks.**';
            }
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });
            
      - name: Auto merge PR
        id: merge-pr
        if: |
          steps.gpg-check.outputs.gpg_verified == 'true' &&
          steps.check-workflows.outputs.workflow_modified == 'false' &&
          steps.check-csproj.outputs.csproj_modified == 'false' &&
          steps.check-code.outputs.contains_restricted == 'false'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              // Attempt to merge the PR
              const result = await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                merge_method: 'merge' // You can change to 'squash' or 'rebase' if preferred
              });
              
              console.log('PR merged successfully:', result.data);
              
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: '✅ PR has been automatically merged!'
              });
              
              // Set outputs for the next step
              core.setOutput('merged', 'true');
              core.setOutput('pr_number', context.issue.number.toString());
              core.setOutput('pr_title', context.payload.pull_request.title);
              core.setOutput('pr_author', context.payload.pull_request.user.login);
              
            } catch (error) {
              console.error('Failed to merge PR:', error);
              
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `❌ Failed to auto-merge PR: ${error.message}\n\nPlease check for conflicts or other issues.`
              });
              
              core.setOutput('merged', 'false');
            }
            
      - name: Trigger Release Workflow
        if: steps.merge-pr.outputs.merged == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Trigger the release workflow using repository_dispatch
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: 'trigger-release',
              client_payload: {
                pr_number: '${{ steps.merge-pr.outputs.pr_number }}',
                pr_title: '${{ steps.merge-pr.outputs.pr_title }}',
                pr_author: '${{ steps.merge-pr.outputs.pr_author }}'
              }
            });
            
            console.log('Release workflow triggered');